<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل الاشتراك</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #007bff; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 40px 20px; }
        .card { background: white; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 400px; overflow: hidden; border: 1px solid #eee; }
        .header { background: var(--primary); color: white; padding: 30px; text-align: center; }
        .header i { font-size: 3rem; margin-bottom: 10px; }
        .body { padding: 25px; }
        .item { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid #f0f0f0; padding-bottom: 8px; }
        .label { color: #888; font-size: 0.9rem; }
        .value { font-weight: 600; color: #333; }
        .timer-box { background: #fff5f5; border: 1px solid #fed7d7; padding: 15px; border-radius: 12px; text-align: center; margin-top: 20px; }
        .timer-val { display: block; font-weight: bold; color: #c53030; font-size: 1.2rem; margin-top: 5px; }
    </style>
</head>
<body>

<div class="card" id="mainCard" style="display:none;">
    <div class="header">
        <i class="fas fa-shield-check"></i>
        <h2 id="view-name">جاري التحميل...</h2>
    </div>
    <div class="body">
        <div class="item"><span class="label">رقم الجوال:</span> <span class="value" id="view-phone">-</span></div>
        <div class="item"><span class="label">نوع الاشتراك:</span> <span class="value" id="view-plan">-</span></div>
        <div class="item"><span class="label">كلمة السر:</span> <span class="value" id="view-pass">-</span></div>
        <div class="item"><span class="label">رابط الدخول:</span> <span class="value"><a id="view-link" href="#" target="_blank">اضغط هنا</a></span></div>
        
        <div class="timer-box">
            <span class="label">متبقي على نهاية الاشتراك:</span>
            <span class="timer-val" id="timer">-- : -- : --</span>
        </div>
    </div>
</div>

<script>
    // وظيفة لقراءة البيانات من الرابط (URL)
    const params = new URLSearchParams(window.location.search);
    
    if(params.has('name')) {
        document.getElementById('mainCard').style.display = 'block';
        document.getElementById('view-name').innerText = params.get('name');
        document.getElementById('view-phone').innerText = params.get('phone');
        document.getElementById('view-plan').innerText = params.get('plan');
        document.getElementById('view-pass').innerText = params.get('pass');
        document.getElementById('view-link').href = params.get('link');

        // العداد التنازلي
        const expiryDate = new Date(params.get('expiry')).getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = expiryDate - now;
            if (diff < 0) {
                document.getElementById('timer').innerText = "انتهى الاشتراك";
            } else {
                const d = Math.floor(diff / 86400000);
                const h = Math.floor((diff % 86400000) / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                document.getElementById('timer').innerText = `${d} يوم و ${h}:${m}:${s}`;
            }
        }, 1000);
    } else {
        document.body.innerHTML = "<h2>خطأ: لا توجد بيانات لهذا الرابط</h2>";
    }
</script>
</body>
</html>
