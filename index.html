<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة اشتراكات Vultr</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #007bff; --success: #28a745; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; min-height: 100vh; align-items: center; }
        .card { background: white; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 450px; overflow: hidden; border: 1px solid #eee; display: none; }
        
        /* تصميم صفحة العميل */
        .client-header { background: var(--primary); color: white; padding: 30px; text-align: center; }
        .client-header i { font-size: 3rem; }
        .info-body { padding: 25px; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid #f0f0f0; padding-bottom: 8px; }
        .label { color: #888; font-size: 0.9rem; }
        .value { font-weight: 600; color: #333; }
        .timer-box { background: #fff8e1; border: 1px solid #ffe082; padding: 15px; border-radius: 12px; text-align: center; margin-top: 20px; }
        .timer-val { display: block; font-weight: bold; color: #d84315; font-size: 1.3rem; margin-top: 5px; }

        /* تصميم صفحة الإدارة (لك) */
        .admin-box { padding: 30px; width: 100%; max-width: 500px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .admin-box h2 { text-align: center; color: var(--primary); }
        .form-group { margin-bottom: 12px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-gen { background: var(--success); color: white; }
        .btn-copy { background: var(--primary); color: white; display: none; margin-top: 15px; }
        #resultLink { word-break: break-all; font-size: 0.8rem; background: #eee; padding: 10px; border-radius: 5px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="card" id="clientCard">
    <div class="client-header">
        <i class="fas fa-user-shield"></i>
        <h2 id="v-name">بيانات الاشتراك</h2>
    </div>
    <div class="info-body">
        <div class="info-row"><span class="label">الجوال:</span> <span class="value" id="v-phone"></span></div>
        <div class="info-row"><span class="label">الاشتراك:</span> <span class="value" id="v-plan"></span></div>
        <div class="info-row"><span class="label">كلمة السر:</span> <span class="value" id="v-pass"></span></div>
        <div class="info-row"><span class="label">الرابط:</span> <span class="value"><a id="v-link" target="_blank">دخول المنصة</a></span></div>
        <div class="timer-box">
            <span class="label">الوقت المتبقي:</span>
            <span class="timer-val" id="timer">-- : -- : --</span>
        </div>
    </div>
</div>

<div class="admin-box" id="adminBox" style="display:none;">
    <h2><i class="fas fa-tools"></i> مولد اشتراكات العملاء</h2>
    <div class="form-group"><input type="text" id="in-name" placeholder="اسم العميل"></div>
    <div class="form-group"><input type="text" id="in-phone" placeholder="رقم الجوال"></div>
    <div class="form-group"><input type="text" id="in-plan" placeholder="نوع الاشتراك"></div>
    <div class="form-group"><input type="text" id="in-pass" placeholder="الرقم السري"></div>
    <div class="form-group"><input type="text" id="in-link" value="https://vultr.com/login" placeholder="رابط الدخول"></div>
    <div class="form-group"><label>تاريخ الانتهاء:</label><input type="date" id="in-expiry"></div>
    
    <button class="btn btn-gen" onclick="generate()">إنشاء الرابط وحفظ</button>
    <div id="resultLink"></div>
    <button class="btn btn-copy" id="copyBtn" onclick="copy()">نسخ الرابط لإرساله</button>
</div>

<script>
    const params = new URLSearchParams(window.location.search);

    // الحالة الأولى: إذا كان الرابط يحتوي على "name" (عرض للعميل)
    if (params.has('name')) {
        document.getElementById('clientCard').style.display = 'block';
        document.getElementById('v-name').innerText = params.get('name');
        document.getElementById('v-phone').innerText = params.get('phone');
        document.getElementById('v-plan').innerText = params.get('plan');
        document.getElementById('v-pass').innerText = params.get('pass');
        document.getElementById('v-link').href = params.get('link');

        const expiry = new Date(params.get('expiry')).getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = expiry - now;
            if (diff <= 0) {
                document.getElementById('timer').innerText = "انتهى الاشتراك";
            } else {
                const d = Math.floor(diff / 86400000);
                const h = Math.floor((diff % 86400000) / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                document.getElementById('timer').innerText = `${d} يوم و ${h}:${m}:${s}`;
            }
        }, 1000);

    } else {
        // الحالة الثانية: الرابط فارغ (عرض صفحة التحكم لك)
        document.getElementById('adminBox').style.display = 'block';
    }

    function generate() {
        const url = window.location.origin + window.location.pathname;
        const p = {
            name: encodeURIComponent(document.getElementById('in-name').value),
            phone: encodeURIComponent(document.getElementById('in-phone').value),
            plan: encodeURIComponent(document.getElementById('in-plan').value),
            pass: encodeURIComponent(document.getElementById('in-pass').value),
            link: encodeURIComponent(document.getElementById('in-link').value),
            expiry: document.getElementById('in-expiry').value
        };
        
        const finalUrl = `${url}?name=${p.name}&phone=${p.phone}&plan=${p.plan}&pass=${p.pass}&link=${p.link}&expiry=${p.expiry}`;
        
        document.getElementById('resultLink').innerText = finalUrl;
        document.getElementById('resultLink').style.display = 'block';
        document.getElementById('copyBtn').style.display = 'block';
    }

    function copy() {
        const text = document.getElementById('resultLink').innerText;
        navigator.clipboard.writeText(text).then(() => alert("تم نسخ الرابط بنجاح!"));
    }
</script>
</body>
</html>
